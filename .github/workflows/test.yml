name: Test Transfer Artefact
on:
  push:
    branches:
      - main
      - feature/**
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'

jobs:
  test:
    name: Tests

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Set up mock AWS credentials
        run: |
          echo "AWS_ACCESS_KEY_ID=mock-key" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=mock-secret" >> $GITHUB_ENV
          echo "AWS_REGION=us-east-1" >> $GITHUB_ENV
          echo "AWS_ENDPOINT_URL=http://s3.localhost.localstack.cloud:4566" >> $GITHUB_ENV

      - name: Start LocalStack
        uses: LocalStack/setup-localstack@v0.2.3
        with:
          image-tag: 'latest'
          install-awslocal: 'true'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Format
        run: npm run format-check

      - name: Run tests
        shell: bash
        run: npm run test

      - name: Create empty directory
        run: mkdir -p path/to/empty-dir

      - name: Test empty directory upload
        uses: ./
        with:
          name: 'Empty-Dir-Test'
          direction: 'upload'
          path: path/to/empty-dir
          if-no-files-found: warn
          artifact-bucket: mock-bucket

      - name: Create special character file
        run: |
          # First verify bucket still exists
          echo "Verifying bucket exists before upload..."
          if ! awslocal s3api head-bucket --bucket mock-bucket; then
            echo "Bucket not found, recreating..."
            awslocal s3 mb s3://mock-bucket
            awslocal s3api put-bucket-acl --bucket mock-bucket --acl public-read-write
          fi

          # Create test directory and files
          mkdir -p "path/to/special chars"
          echo "File with spaces" > "path/to/special chars/file with spaces.txt"
          echo "File with symbols" > "path/to/special chars/file-with-@#$symbols.txt"

          # Test direct upload to verify bucket access
          echo "Testing direct upload with awslocal..."
          awslocal s3 cp "path/to/special chars/file with spaces.txt" "s3://mock-bucket/test-upload.txt"
          if [ $? -eq 0 ]; then
            echo "Direct upload test successful"
            awslocal s3 rm "s3://mock-bucket/test-upload.txt"
          else
            echo "Direct upload test failed"
            exit 1
          fi
        shell: bash

      - name: Test special character upload
        uses: ./
        with:
          name: special-char-artifact
          direction: 'upload'
          path: path/to/special
          artifact-bucket: mock-bucket

      - name: Create 100 small files
        run: |
          mkdir -p path/to/many-files
          for i in {1..100}; do
            echo "Content for file $i" > "path/to/many-files/file$i.txt"
          done
        shell: bash

      - name: Test 100 files upload
        uses: ./
        with:
          name: 'Many-Files-Test'
          direction: 'upload'
          path: path/to/many-files/*
          artifact-bucket: mock-bucket

      - name: Check if 100 files were uploaded
        run: |
          FILE_COUNT=$(ls path/to/many-files | wc -l)
          if [ "$FILE_COUNT" -ne 100 ]; then
            echo "Upload failed: Expected 100 files, but found $FILE_COUNT."
            exit 1
          fi
          echo "Upload successful: All 100 files are present."

      - name: Create different file types
        run: |
          mkdir -p path/to/file-types
          echo '{"key": "value"}' > path/to/file-types/test.json
          echo '<?xml version="1.0"?><root>test</root>' > path/to/file-types/test.xml
          echo 'binary content' > path/to/file-types/test.bin
          echo '#!/bin/bash\necho "test"' > path/to/file-types/test.sh
          chmod +x path/to/file-types/test.sh
        shell: bash

      - name: Test different file types upload
        uses: ./
        with:
          name: 'File-Types-Test'
          direction: 'upload'
          path: path/to/file-types/*
          artifact-bucket: mock-bucket

      - name: Check if 4 different file types were uploaded
        run: |
          FILE_COUNT=$(ls path/to/file-types | wc -l)
          if [ "$FILE_COUNT" -ne 4 ]; then
            echo "Upload failed: Expected 4 files, but found $FILE_COUNT."
            exit 1
          fi
          echo "Upload successful: All 4 files are present."

      - name: Create test files
        run: |
          mkdir -p path/to/dir-1
          mkdir -p path/to/dir-2
          mkdir -p path/to/dir-3
          echo "Lorem ipsum dolor sit amet" > path/to/dir-1/file1.txt
          echo "Hello world from file #2" > path/to/dir-2/file2.txt
          echo "This is going to be a test for a large enough file that should get compressed with GZip" > path/to/dir-3/gzip.gz

      - name: Test single file artifact upload
        uses: ./
        with:
          name: 'Artifact-A'
          direction: 'upload'
          path: path/to/dir-1/file1.txt
          artifact-bucket: mock-bucket

      - name: Check if 1 file was uploaded
        run: |
          FILE_COUNT=$(ls  path/to/dir-1 | wc -l)
          if [ "$FILE_COUNT" -ne 1 ]; then
            echo "Upload failed: Expected 1 file, but found $FILE_COUNT."
            exit 1
          fi
          echo "Upload successful: 1 file is present."

      - name: Test wildcard pattern upload
        uses: ./
        with:
          path: path/**/dir*/
          artifact-bucket: mock-bucket

      - name: Check if 3 files were uploaded when using wildcard pattern
        run: |
          FILE_COUNT=$(find path -type f -path "*/dir*/*" | wc -l)
          if [ "$FILE_COUNT" -ne 3 ]; then
            echo "Upload failed: Expected 3 files, but found $FILE_COUNT."
            exit 1
          fi
          echo "Upload successful: All 3 files are present."

      - name: Test GZip artifact upload
        uses: ./
        with:
          name: 'GZip-Artifact'
          direction: 'upload'
          path: path/to/dir-3/
          artifact-bucket: mock-bucket

      - name: Check if 1 GZip artifact was uploaded
        run: |
          FILE_COUNT=$(ls  path/to/dir-3 | wc -l)
          if [ "$FILE_COUNT" -ne 1 ]; then
            echo "Upload failed: Expected 1 file, but found $FILE_COUNT."
            exit 1
          fi
          echo "Upload successful: 1 file is present."

      - name: Test multi-path artifact upload
        uses: ./
        with:
          name: 'Multi-Path-Artifact'
          direction: 'upload'
          path: |
            path/to/dir-1/*
            path/to/dir-[23]/*
            !path/to/dir-3/*.txt
          artifact-bucket: mock-bucket

      - name: Check if 3 multi-path files were uploaded
        run: |
          FILE_COUNT=$(find path/to/dir-1 path/to/dir-2 path/to/dir-3 -type f | grep -v "path/to/dir-3/.*\.txt" | wc -l)
          if [ "$FILE_COUNT" -ne 3 ]; then
            echo "Upload failed: Expected 3 files, but found $FILE_COUNT."
            exit 1
          fi
          echo "Upload successful: All 3 files are present."

      - name: Create test file
        run: |
          mkdir -p some/new/path
          echo "Lorem ipsum dolor sit amet" > some/new/path/file1.txt
        shell: bash

      - name: Verify single file artifact
        run: |
          file="some/new/path/file1.txt"
          if [ ! -f "$file" ]; then
              echo "Expected file does not exist"
              exit 1
          fi
          if [ "$(cat "$file")" != "Lorem ipsum dolor sit amet" ]; then
              echo "File contents of downloaded artifact are incorrect"
              exit 1
          fi
        shell: bash

      - name: Download and verify single file artifact
        uses: ./
        with:
          name: 'artifact-a'
          direction: 'download'
          path: some/new/path
          artifact-bucket: mock-bucket

      - name: Upload empty directory artifact
        uses: ./
        with:
          name: 'Empty-Dir-Test'
          direction: 'upload'
          path: empty-dir-test
          artifact-bucket: mock-bucket
          if-no-files-found: ignore

      - name: Download empty directory artifact
        uses: ./
        with:
          path: empty-dir-test
          direction: 'download'
          name: 'empty-dir-test'
          artifact-bucket: mock-bucket

      - name: Download special characters artifact
        uses: ./
        with:
          path: special/artifact
          direction: 'download'
          name: 'special-chars-test'
          artifact-bucket: mock-bucket

      - name: Download many files artifact
        id: download_many_artifacts
        uses: ./
        with:
          name: 'Many-Files-Test'
          direction: 'download'
          path: many-files-test
          artifact-bucket: mock-bucket

      - name: Verify total objects downloaded
        run: |
          echo "Download logs:"
          cat $GITHUB_WORKSPACE/some/new/path/download.log  # Adjust this path if needed

          TOTAL_DOWNLOADED=$(grep -oP 'Total objects downloaded: \K\d+' $GITHUB_WORKSPACE/some/new/path/download.log)

          EXPECTED_COUNT=100
          if [ "$TOTAL_DOWNLOADED" -ne "$EXPECTED_COUNT" ]; then
            echo "Download failed: Expected $EXPECTED_COUNT objects, but found $TOTAL_DOWNLOADED."
            exit 1
          fi
          echo "Download successful: $TOTAL_DOWNLOADED objects downloaded."

      - name: Verify file types
        run: |
          files=("test.json" "test.xml" "test.bin" "test.sh")

          # Check if files exist
          for file in "${files[@]}"; do
            if [ ! -f "path/to/file-types/$file" ]; then
              echo "File $file not found"
              exit 1
            fi
          done

          # Verify JSON content
          jsonContent=$(jq -r '.key' path/to/file-types/test.json 2>/dev/null)
          if [ "$jsonContent" != "value" ]; then
            echo "JSON content is incorrect"
            exit 1
          fi

          # Verify XML content
          xmlContent=$(cat path/to/file-types/test.xml 2>/dev/null)
          if [[ "$xmlContent" != *"<root>test</root>"* ]]; then
            echo "XML content is incorrect"
            exit 1
          fi
        shell: bash

      - name: Download file types artifact
        uses: ./
        with:
          name: 'File-Types-Test'
          direction: 'download'
          path: file-types-test
          artifact-bucket: mock-bucket

      - name: Verify wildcard pattern artifact
        run: |
          file1="path/to/dir-1/file1.txt"
          file2="path/to/dir-2/file2.txt"

          # Check if files exist
          if [ ! -f "$file1" ] || [ ! -f "$file2" ]; then
            echo "Expected files do not exist"
            exit 1
          fi

          # Verify file contents
          file1_content=$(cat "$file1" 2>/dev/null)
          file2_content=$(cat "$file2" 2>/dev/null)

          if [ "$file1_content" != "Lorem ipsum dolor sit amet" ] || [ "$file2_content" != "Hello world from file #2" ]; then
            echo "File contents of downloaded artifacts are incorrect"
            exit 1
          fi
        shell: bash

      - name: Download and verify wildcard pattern artifact
        uses: ./
        with:
          path: some/*/to/*
          direction: 'download'
          artifact-bucket: mock-bucket

      - name: Verify GZip artifact
        run: |
          gzipFile="path/to/dir-3/gzip.gz"

          # Check if the GZip file exists
          if [ ! -f "$gzipFile" ]; then
            echo "Expected file does not exist"
            exit 1
          fi
        shell: bash

      - name: Download and verify GZip artifact
        uses: ./
        with:
          path: gzip/*
          direction: 'download'
          artifact-bucket: mock-bucket

      - name: Create multi-path artifact files
        run: |
          file1="multi/artifact/dir-1/file1.txt"
          file2="multi/artifact/dir-2/file2.txt"

          # Ensure directories exist
          mkdir -p "$(dirname "$file1")" "$(dirname "$file2")"

          # Create files with expected content
          echo "Lorem ipsum dolor sit amet" > "$file1"
          echo "Hello world from file #2" > "$file2"
        shell: bash

      - name: Verify multi-path artifact
        run: |
          file1="multi/artifact/dir-1/file1.txt"
          file2="multi/artifact/dir-2/file2.txt"

          # Verify file existence
          if [ ! -f "$file1" ] || [ ! -f "$file2" ]; then
            echo "Expected files do not exist"
            exit 1
          fi

          # Verify file contents
          file1_content=$(cat "$file1" 2>/dev/null)
          file2_content=$(cat "$file2" 2>/dev/null)

          if [ "$file1_content" != "Lorem ipsum dolor sit amet" ] || [ "$file2_content" != "Hello world from file #2" ]; then
            echo "File contents of downloaded artifacts are incorrect"
            exit 1
          fi
        shell: bash

      - name: Download and verify multi-path artifact
        uses: ./
        with:
          path: multi/artifact/*
          direction: 'download'
          merge-multiple: true
          artifact-bucket: mock-bucket
